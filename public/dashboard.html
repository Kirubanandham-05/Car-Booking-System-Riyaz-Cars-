<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Riyaz Cars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/styles.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-slate-200">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <h1 class="text-xl font-bold text-slate-900">Riyaz Cars</h1>
                </div>
                <div class="flex items-center gap-4">
                    <a id="profileLink" href="/profile" class="text-sm text-slate-600">Profile</a>
                    <span id="userName" class="text-sm text-slate-600"></span>
                    <button id="logoutBtn" class="px-4 py-2 text-sm font-medium text-slate-700 hover:text-slate-900">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <!-- Tabs -->
        <div class="mb-6">
            <div class="flex gap-2 border-b border-slate-200">
                <button id="carsTab" class="px-6 py-3 font-semibold border-b-2 border-blue-600 text-blue-600">
                    Available Cars
                </button>
                <button id="bookingsTab" class="px-6 py-3 font-semibold border-b-2 border-transparent text-slate-600 hover:text-slate-900">
                    My Bookings
                </button>
            </div>
        </div>

        <!-- Cars Section -->
        <div id="carsSection">
            <div id="carsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- Bookings Section -->
        <div id="bookingsSection" class="hidden">
            <div id="bookingsList" class="space-y-4"></div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-2xl font-bold text-slate-900">Book Your Car</h2>
                <button id="closeModal" class="text-slate-400 hover:text-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <form id="bookingForm" class="space-y-4">
                <input type="hidden" id="selectedCarId">
                
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Pickup Location</label>
                        <input type="text" id="pickupLocation" required 
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Dropoff Location</label>
                        <input type="text" id="dropoffLocation" required 
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Pickup Date</label>
                        <input type="date" id="pickupDate" required 
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Dropoff Date</label>
                        <input type="date" id="dropoffDate" required 
                            class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="bg-slate-50 p-4 rounded-lg">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-600">Total Days:</span>
                        <span id="totalDays" class="font-semibold text-slate-900">0</span>
                    </div>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-slate-600">Total Price:</span>
                        <span id="totalPrice" class="font-bold text-blue-600 text-xl">₹0</span>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                    Confirm Booking
                </button>
            </form>
        </div>
    </div>

    <script src="/js/utils.js"></script>
    <script src="/js/dashboard.js"></script>
    <!-- Global contact button -->
    <button id="contactOwnerBtn" data-owner-id="" class="fixed right-4 bottom-4 bg-indigo-600 text-white px-4 py-2 rounded-full shadow-lg">Contact</button>
    <script src="/js/contact.js"></script>
</body>
</html>
