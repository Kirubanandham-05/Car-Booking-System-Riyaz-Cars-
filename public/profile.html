<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Profile - Riyaz Cars</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-slate-50 min-h-screen">
  <nav class="bg-white shadow-sm border-b border-slate-200">
    <div class="container mx-auto px-4">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center gap-3">
          <h1 class="text-xl font-bold text-slate-900">Riyaz Cars</h1>
        </div>
        <div class="flex items-center gap-4">
          <a href="/dashboard" class="text-sm text-slate-600">Dashboard</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="container mx-auto px-4 py-10">
    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-md overflow-hidden">
      <div class="md:flex">
        <aside class="md:w-1/3 bg-slate-50 p-6 flex flex-col items-center gap-4">
          <div class="w-36 h-36 rounded-full overflow-hidden border-2 border-slate-200">
            <img id="avatarPreview" src="/images/placeholder-avatar.svg" alt="User avatar" class="w-full h-full object-cover" />
          </div>
          <div class="text-center">
            <h2 id="displayName" class="text-lg font-semibold text-slate-900">Your Name</h2>
            <p id="displayEmail" class="text-sm text-slate-600">you@example.com</p>
          </div>
          <div class="w-full text-center">
            <label for="avatarInput" class="sr-only">Upload profile picture</label>
            <!-- Hidden file input; use button to trigger file picker so filename is not shown -->
            <input id="avatarInput" type="file" accept="image/*" class="hidden" />
            <button id="changeAvatarBtn" type="button" class="mt-2 px-3 py-2 border rounded-md text-sm text-slate-700 hover:bg-white">Change photo</button>
            <div id="avatarUploadMessage" class="text-xs text-slate-500 mt-2">PNG or JPG — max 5MB</div>
            <div class="mt-3">
              <button id="contactOwnerBtn" type="button" class="w-full px-3 py-2 bg-indigo-600 text-white rounded-md">Contact owner</button>
            </div>
          </div>
        </aside>

        <main class="md:w-2/3 p-6">
          <div class="flex items-start justify-between">
            <div>
              <h3 class="text-2xl font-bold text-slate-900">Profile</h3>
              <p class="text-sm text-slate-500">Update your personal information and password.</p>
            </div>
            <div>
              <button id="editProfileBtn" type="button" class="px-3 py-2 text-sm border rounded-md text-slate-700 hover:bg-slate-50">Edit profile</button>
            </div>
          </div>

          <form id="profileForm" class="mt-6 grid gap-4">
            <div id="profileMessage" class="hidden p-3 rounded-md" aria-live="polite"></div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
                <input id="email" type="email" disabled class="mt-1 block w-full px-4 py-2 border rounded-lg bg-slate-50" />
              </div>
              <div>
                <label for="name" class="block text-sm font-medium text-slate-700">Full name</label>
                <input id="name" type="text" disabled class="mt-1 block w-full px-4 py-2 border rounded-lg bg-slate-50" />
              </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label for="phone" class="block text-sm font-medium text-slate-700">Phone</label>
                <input id="phone" type="text" disabled class="mt-1 block w-full px-4 py-2 border rounded-lg bg-slate-50" />
              </div>
              <div id="passwordWrapper" class="hidden">
                <label for="password" class="block text-sm font-medium text-slate-700">New password</label>
                <input id="password" type="password" disabled placeholder="Leave blank to keep existing" class="mt-1 block w-full px-4 py-2 border rounded-lg bg-slate-50" />
              </div>
            </div>

            <div>
              <label for="address" class="block text-sm font-medium text-slate-700">Address</label>
              <textarea id="address" disabled class="mt-1 block w-full px-4 py-2 border rounded-lg bg-slate-50" rows="4"></textarea>
            </div>

            <div class="flex items-center justify-end gap-3">
              <button id="cancelBtn" type="button" class="px-4 py-2 border rounded-md text-slate-700 hover:bg-slate-50 hidden">Cancel</button>
              <button id="saveProfileBtn" type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-md hidden">Save changes</button>
              <button id="editHint" type="button" class="px-4 py-2 border rounded-md text-slate-500 bg-slate-100" disabled>Viewing mode</button>
            </div>
          </form>
        </main>
      </div>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script src="/js/profile.js"></script>
  <script src="/js/contact.js"></script>
</body>
</html>
